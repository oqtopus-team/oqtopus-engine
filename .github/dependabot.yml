version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/combiner"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/core"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
